<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mission 9 - 5 x 5 Color Lesson</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="level-page game-level" data-mission-type="small" data-solution="18" data-tutorial="threshold-zones">
  <main class="level-shell">
    <header class="level-topbar">
      <a class="return-link" href="index.html">&larr; Back To Levels</a>
      <div class="level-meta-group">
        <div class="mission-id-pill">Level 9</div>
        <div class="mission-size-pill">5 x 5 Color Lesson</div>
        <button id="mode-toggle-btn" class="mode-toggle-button" type="button">Pro Mode</button>
      </div>
    </header>

    <section class="mission-header-compact">
      <div class="mission-status-strip">
        <div class="stat-grid game-stat-grid">
          <div class="stat-card">Sensors: <span id="gbest" class="bold-text"></span></div>
          <div class="stat-card">Coverage: <span id="map-check" class="bold-text"></span></div>
        </div>

        <div class="legend-group">
          <div class="label-box">
            <div class="sensor-box"></div> : Sensor
          </div>
          <div class="label-box">
            <div class="dissatisfy-box">
              <div class="diagonal-line"></div>
            </div>
            : Weak Zone
          </div>
        </div>
      </div>
    </section>

    <section class="mission-layout compact-layout">
      <div class="mission-stage">
        <div id="sensor-deployment-panel" class="framed mission-panel">
          <div class="inside">
            <div class="interactive-panel">
              <div id="clickable-box" class="clickable-box"></div>
              <div class="status-bar" id="status-bar"></div>

              <div class="dropdown-section game-control-panel">
                <div class="tool-block level-fixed-select">
                  <label for="solution">Choose a Mission Map</label>
                  <select id="solution"></select>
                </div>

                <div class="button-row game-button-grid">
                  <button id="threshold-btn" class="action-button game-action-button" title="Coverage View" aria-label="Coverage View">Coverage<br>View</button>
                  <button id="connect-btn" class="action-button game-action-button" title="Show Links" aria-label="Show Links">Show<br>Links</button>
                  <button id="undo-btn" class="action-button game-action-button" title="Undo Move" aria-label="Undo Move">Undo<br>Move</button>
                  <button id="savemap-btn" class="action-button game-action-button" title="Save Map" aria-label="Save Map">Save<br>Map</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <nav class="level-nav">
      <a href="level-8.html">Previous Level</a>
          <a href="level-10.html">Next Level</a>
        </nav>
      </div>
    </section>
  </main>

  <script src="./panel/map_model.js"></script>
  <script src="./panel/level_page_init.js"></script>
</body>
</html>
